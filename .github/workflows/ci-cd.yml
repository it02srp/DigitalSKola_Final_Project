name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql, pdo_sqlite, sqlite3, zip, gd, intl, bcmath, openssl, tokenizer, ctype, fileinfo, dom, xml, json
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate

      - name: Set directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: PHP Environment check
        run: |
          echo "## PHP Environment" >> $GITHUB_STEP_SUMMARY
          echo "- PHP: $(php --version | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "- SQLite: $(php -r 'echo class_exists(PDO::class) ? "PDO OK" : "No PDO";')" >> $GITHUB_STEP_SUMMARY
          echo "- Extensions: $(php -m | tr '\n' ' ')" >> $GITHUB_STEP_SUMMARY
          php artisan --version

      - name: Run PHP tests (SQLite in-memory)
        run: |
          php artisan test 2>&1 | tee /tmp/test.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f storage/logs/laravel.log ]; then
            echo "## Laravel Error Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -60 storage/logs/laravel.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT_CODE

      - name: Run Laravel Pint (code style check)
        run: ./vendor/bin/pint --test

  # ─────────────────────────────────────────
  # JOB 2: Build & Deploy (hanya saat push ke main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aimeos_shop
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql, zip, gd, intl, bcmath

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node & build assets
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.APP_DIR }}
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan aimeos:setup
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart
            echo "Deploy selesai: $(date)"
